<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="The Number Plate Shop logo">
  <circle cx="120" cy="120" r="119" fill="#0a0a0a" />
  <circle cx="120" cy="120" r="106" fill="none" stroke="#ffffff" stroke-width="5" />

  <!-- Centre lockup: yellow plate "THE NUMBER PLATE" + white "SHOP" -->
  <rect x="30" y="103" width="112" height="34" rx="5" fill="#ffd400" stroke="#ffffff" stroke-width="2.5" />
  <text
    x="86"
    y="125"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="13"
    fill="#0a0a0a"
    textLength="100"
    lengthAdjust="spacingAndGlyphs"
  >THE NUMBER PLATE</text>
  <text
    x="148"
    y="126"
    text-anchor="start"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="22"
    fill="#ffffff"
  >SHOP</text>

  <line x1="50" y1="150" x2="190" y2="150" stroke="#ffffff" stroke-width="1.5" />
  <text
    x="120"
    y="167"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="9"
